name: Deploy to Oracle VPS

on:
  push:
    branches:
      - dev
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure VPS and Deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: |
            set -e
            # Navigate to project directory
            cd ~/vouches || {
              echo "Directory ~/vouches not found, trying ${{ secrets.DEPLOY_PATH }}"
              cd ${{ secrets.DEPLOY_PATH }}
            }

            # Sync code
            git fetch origin dev
            git reset --hard origin/dev
            
            # Install dependencies and build
            npm install
            npx prisma generate
            npm run build
            
            # Restart processes
            if command -v pm2 &> /dev/null; then
              pm2 restart all || {
                echo "PM2 restart failed, attempting to start fresh"
                pm2 delete vouch-site || true
                pm2 delete vouch-bot || true
                pm2 start npm --name "vouch-site" -- start -- -p 3000
                pm2 start npm --name "vouch-bot" -- run bot
              }
            else
              echo "PM2 not found. Installing and starting..."
              sudo npm install -g pm2
              pm2 start npm --name "vouch-site" -- start -- -p 3000
              pm2 start npm --name "vouch-bot" -- run bot
            fi
            
            echo "Deployment successful!"
            pm2 status
