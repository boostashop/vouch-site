name: Deploy to Oracle VPS

on:
  push:
    branches:
      - dev
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure VPS and Deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: |
            set -e
            # 1. Open Port 3000
            echo "Configuring firewall..."
            sudo ufw allow 3000/tcp || true
            sudo iptables -I INPUT -p tcp --dport 3000 -j ACCEPT || true
            
            # 2. Ensure Node.js and NPM are installed
            if ! command -v node &> /dev/null; then
              echo "Node.js not found. Installing..."
              curl -fsSL https://deb.nodesource.com/setup_22.x | sudo -E bash -
              sudo apt-get install -y nodejs
            fi

            # 3. Check for PostgreSQL
            echo "Checking PostgreSQL..."
            if ! command -v psql &> /dev/null; then
              echo "PostgreSQL not found. Installing..."
              sudo apt-get update
              sudo apt-get install -y postgresql postgresql-contrib
              sudo systemctl start postgresql
              sudo systemctl enable postgresql
              
              # Create a default database and user for the app
              sudo -u postgres psql -c "CREATE USER vouchuser WITH PASSWORD 'vouchpass';" || true
              sudo -u postgres psql -c "CREATE DATABASE vouchdb OWNER vouchuser;" || true
              sudo -u postgres psql -c "GRANT ALL PRIVILEGES ON DATABASE vouchdb TO vouchuser;" || true
            else
              echo "PostgreSQL is already installed."
            fi

            # 4. Standard Deploy
            cd ${{ secrets.DEPLOY_PATH }} || {
              mkdir -p ${{ secrets.DEPLOY_PATH }}
              cd ${{ secrets.DEPLOY_PATH }}
              git clone -b dev https://github.com/${{ github.repository }}.git .
            }
            git fetch origin dev
            git reset --hard origin/dev
            
            npm install
            if ! command -v pm2 &> /dev/null; then
              sudo npm install -g pm2
            fi
            
            # Use the local DB if no DATABASE_URL is provided
            export DATABASE_URL="postgresql://vouchuser:vouchpass@localhost:5432/vouchdb"
            
            npx prisma generate
            npm run build
            pm2 delete vouch-site || true
            pm2 start npm --name "vouch-site" -- start -- -p 3000
